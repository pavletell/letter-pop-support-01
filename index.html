  <script>
    const I18N = {"en": {"title": "LetterPop Support", "updatedLabel": "Last updated:", "intro": "LetterPop is a word-building game for iPhone and iPad. Pop floating letter balls in the right order to spell words, unlock animal friends, and play in 11 languages. This page answers common questions — if you don't find what you need, email <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>.", "download": "Download LetterPop on the App Store", "langLabel": "Language", "sections": [{"h": "Getting started", "items": [{"q": "How do I play?", "a": "A target word appears at the top of the screen. Tap the letter balls in order, from left to right, to spell it. Each correct letter scores points, and completing the word triggers a celebration. The wrong letter shakes and dings — no penalty, just try again."}, {"q": "How does scoring work?", "a": "Each letter gives you 5 base points multiplied by your current multiplier. The multiplier doubles each time you reach a milestone, so longer streaks earn much more."}, {"q": "What are the animal characters?", "a": "The little animal in the top-left corner is your companion. You start with the Otter and unlock more animals (each with their own peek animation) by reaching score milestones. Animals stay unlocked even if you reset your score."}]}, {"h": "Languages & word lists", "items": [{"q": "Which languages are supported?", "a": "English, Spanish, Italian, French, German, Russian, Ukrainian, Korean, Chinese, Japanese, and Arabic — 11 in all. You can switch languages anytime from Settings."}, {"q": "Can I use my own word list?", "a": "Yes. LetterPop accepts plain text files (<code>.txt</code>) or its own <code>.lpwords</code> format — one word per line. To import:<ul><li>Save the file to the Files app, iCloud Drive, or AirDrop it to your device.</li><li>Open the file and choose \"Open in LetterPop\", <em>or</em></li><li>Copy the file into LetterPop's folder via Finder (iPhone/iPad → Files → LetterPop).</li><li>Open Settings inside the app and select the new list.</li></ul>Files should be UTF-8, UTF-16, or ASCII. If letters look garbled, re-save the file as UTF-8 and import again."}, {"q": "How do I change word length?", "a": "Open Settings and pick a maximum word length from 3 to 7 letters. Shorter words make for a faster, easier game; longer words are more challenging."}, {"q": "How do I delete a custom word list?", "a": "Open Settings, find your imported list, and tap the delete control next to it. Built-in languages can't be removed."}]}, {"h": "Sound & speech", "items": [{"q": "Why doesn't the app speak words on the first try?", "a": "LetterPop uses your device's built-in voices. The first time a word is spoken, iOS may need a moment to load the voice. To make speech instant, open Settings inside LetterPop and tap \"Pre-cache audio\" — this downloads audio for every word in the current list. The settings stay locked while caching runs; just let it finish."}, {"q": "The voice for my language sounds robotic or is missing.", "a": "Voice quality is controlled by iOS. To install higher-quality voices, go to <strong>iOS Settings → Accessibility → Spoken Content → Voices</strong>, pick your language, and download an enhanced or premium voice. Restart LetterPop and the new voice will be used."}]}, {"h": "In-app purchases", "items": [{"q": "Are there ads or required purchases?", "a": "No. LetterPop has no ads, no subscriptions, and no paywalled features. Everything in the game is available for free."}, {"q": "What does \"Support Development\" do?", "a": "It's a fully optional tip jar. You can leave a one-time tip ($0.99, $1.99, or $4.99) to help fund development. It doesn't unlock anything — it's just a thank-you."}, {"q": "How do I restore a previous purchase?", "a": "Open the \"Support Development\" screen and tap <strong>Restore Purchases</strong>. Make sure you're signed in to the same Apple ID you used originally."}, {"q": "I want a refund.", "a": "Refunds for App Store purchases are handled by Apple, not by the developer. Visit <a href=\"https://reportaproblem.apple.com\">reportaproblem.apple.com</a>, sign in with your Apple ID, find the LetterPop transaction, and submit a refund request."}]}, {"h": "Data, reset, and privacy", "items": [{"q": "Does LetterPop collect any data?", "a": "No. LetterPop does not collect, store, or share any personal data. Scores, unlocked animals, and your word-list preferences are saved only on your device. See our <a href=\"../PrivacyPolicy/\">Privacy Policy</a> for details."}, {"q": "How do I reset my score?", "a": "Open Settings and tap <strong>Reset Game</strong>. This clears your score but keeps the animals you've unlocked."}, {"q": "How do I erase everything?", "a": "Open Settings and tap <strong>Delete App Data</strong>. This removes all scores, unlocked animals, and imported word lists — the app returns to its first-launch state. Deleting the app from your home screen also removes all local data."}]}, {"h": "Devices & requirements", "items": [{"q": "Which devices does LetterPop run on?", "a": "iPhone and iPad running <strong>iOS / iPadOS 18.6 or later</strong>. iPhone uses portrait orientation; iPad supports portrait and landscape."}, {"q": "Does the game sync across devices?", "a": "Not currently — progress is stored locally on each device."}]}, {"h": "Troubleshooting", "items": [{"q": "The app froze or letters stopped responding.", "a": "Swipe up to close LetterPop and reopen it. If it happens repeatedly, restart your device. If the issue persists, please email us with your device model and iOS version."}, {"q": "An imported word list shows no words.", "a": "Most likely the file's text encoding isn't supported. Open the file in a plain text editor (TextEdit on macOS, for example), use <em>Format → Make Plain Text</em>, save as UTF-8, and import again."}]}], "needHelp": "Still need help?", "contact": "Email <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>. Please include your device model, iOS version, and a short description of the problem (a screenshot helps a lot).", "_dir": "ltr", "_date": "May 12, 2026"}, "es": {"title": "Soporte de LetterPop", "updatedLabel": "Última actualización:", "intro": "LetterPop es un juego de formar palabras para iPhone y iPad. Explota las bolas de letras flotantes en el orden correcto para deletrear palabras, desbloquea amigos animales y juega en 11 idiomas. Esta página responde a las preguntas más frecuentes. Si no encuentras lo que necesitas, escribe a <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>.", "download": "Descarga LetterPop en el App Store", "langLabel": "Idioma", "sections": [{"h": "Primeros pasos", "items": [{"q": "¿Cómo se juega?", "a": "En la parte superior de la pantalla aparece una palabra objetivo. Toca las bolas de letras en orden, de izquierda a derecha, para deletrearla. Cada letra correcta suma puntos, y completar la palabra activa una celebración. La letra incorrecta tiembla y suena un tono, sin penalización; solo tienes que volver a intentarlo."}, {"q": "¿Cómo funciona la puntuación?", "a": "Cada letra te da 5 puntos base multiplicados por tu multiplicador actual. El multiplicador se duplica cada vez que alcanzas un hito, así que las rachas más largas te hacen ganar mucho más."}, {"q": "¿Qué son los personajes animales?", "a": "El pequeño animal de la esquina superior izquierda es tu compañero. Empiezas con la Nutria y desbloqueas más animales (cada uno con su propia animación de asomarse) al alcanzar hitos de puntuación. Los animales siguen desbloqueados aunque restablezcas tu puntuación."}]}, {"h": "Idiomas y listas de palabras", "items": [{"q": "¿Qué idiomas son compatibles?", "a": "Inglés, español, italiano, francés, alemán, ruso, ucraniano, coreano, chino, japonés y árabe: 11 en total. Puedes cambiar de idioma en cualquier momento desde los Ajustes."}, {"q": "¿Puedo usar mi propia lista de palabras?", "a": "Sí. LetterPop admite archivos de texto sin formato (<code>.txt</code>) o su propio formato <code>.lpwords</code>: una palabra por línea. Para importar:<ul><li>Guarda el archivo en la app Archivos, en iCloud Drive, o envíalo a tu dispositivo por AirDrop.</li><li>Abre el archivo y elige \"Abrir en LetterPop\", <em>o</em></li><li>Copia el archivo en la carpeta de LetterPop a través de Finder (iPhone/iPad → Archivos → LetterPop).</li><li>Abre los Ajustes dentro de la app y selecciona la nueva lista.</li></ul>Los archivos deben estar en UTF-8, UTF-16 o ASCII. Si las letras se ven distorsionadas, vuelve a guardar el archivo como UTF-8 e impórtalo de nuevo."}, {"q": "¿Cómo cambio la longitud de las palabras?", "a": "Abre los Ajustes y elige una longitud máxima de palabra de 3 a 7 letras. Las palabras más cortas hacen el juego más rápido y fácil; las más largas son más desafiantes."}, {"q": "¿Cómo elimino una lista de palabras personalizada?", "a": "Abre los Ajustes, busca tu lista importada y toca el control de eliminación que aparece junto a ella. Los idiomas integrados no se pueden eliminar."}]}, {"h": "Sonido y voz", "items": [{"q": "¿Por qué la app no pronuncia las palabras en el primer intento?", "a": "LetterPop utiliza las voces integradas de tu dispositivo. La primera vez que se pronuncia una palabra, iOS puede necesitar un momento para cargar la voz. Para que el habla sea instantánea, abre los Ajustes dentro de LetterPop y toca \"Precargar audio\": esto descarga el audio de cada palabra de la lista actual. Los ajustes permanecen bloqueados mientras se realiza la precarga; simplemente deja que termine."}, {"q": "La voz de mi idioma suena robótica o no está disponible.", "a": "La calidad de la voz la controla iOS. Para instalar voces de mayor calidad, ve a <strong>Ajustes de iOS → Accesibilidad → Contenido hablado → Voces</strong>, elige tu idioma y descarga una voz mejorada o premium. Reinicia LetterPop y se utilizará la nueva voz."}]}, {"h": "Compras dentro de la app", "items": [{"q": "¿Hay anuncios o compras obligatorias?", "a": "No. LetterPop no tiene anuncios, ni suscripciones, ni funciones de pago. Todo en el juego está disponible de forma gratuita."}, {"q": "¿Qué hace \"Apoyar el desarrollo\"?", "a": "Es un bote de propinas totalmente opcional. Puedes dejar una propina única ($0.99, $1.99 o $4.99) para ayudar a financiar el desarrollo. No desbloquea nada; es solo una forma de dar las gracias."}, {"q": "¿Cómo restauro una compra anterior?", "a": "Abre la pantalla \"Apoyar el desarrollo\" y toca <strong>Restaurar compras</strong>. Asegúrate de haber iniciado sesión con el mismo Apple ID que usaste originalmente."}, {"q": "Quiero un reembolso.", "a": "Los reembolsos de las compras del App Store los gestiona Apple, no el desarrollador. Visita <a href=\"https://reportaproblem.apple.com\">reportaproblem.apple.com</a>, inicia sesión con tu Apple ID, busca la transacción de LetterPop y envía una solicitud de reembolso."}]}, {"h": "Datos, restablecimiento y privacidad", "items": [{"q": "¿LetterPop recopila datos?", "a": "No. LetterPop no recopila, almacena ni comparte ningún dato personal. Las puntuaciones, los animales desbloqueados y tus preferencias de listas de palabras se guardan únicamente en tu dispositivo. Consulta nuestra <a href=\"../PrivacyPolicy/\">Política de privacidad</a> para más detalles."}, {"q": "¿Cómo restablezco mi puntuación?", "a": "Abre los Ajustes y toca <strong>Reiniciar juego</strong>. Esto borra tu puntuación, pero conserva los animales que has desbloqueado."}, {"q": "¿Cómo borro todo?", "a": "Abre los Ajustes y toca <strong>Eliminar datos de la app</strong>. Esto elimina todas las puntuaciones, los animales desbloqueados y las listas de palabras importadas: la app vuelve a su estado de primer inicio. Eliminar la app de tu pantalla de inicio también borra todos los datos locales."}]}, {"h": "Dispositivos y requisitos", "items": [{"q": "¿En qué dispositivos funciona LetterPop?", "a": "iPhone y iPad con <strong>iOS / iPadOS 18.6 o posterior</strong>. El iPhone usa orientación vertical; el iPad admite orientación vertical y horizontal."}, {"q": "¿El juego se sincroniza entre dispositivos?", "a": "Por ahora no: el progreso se guarda localmente en cada dispositivo."}]}, {"h": "Resolución de problemas", "items": [{"q": "La app se congeló o las letras dejaron de responder.", "a": "Desliza hacia arriba para cerrar LetterPop y vuelve a abrirla. Si ocurre repetidamente, reinicia tu dispositivo. Si el problema persiste, escríbenos indicando el modelo de tu dispositivo y la versión de iOS."}, {"q": "Una lista de palabras importada no muestra palabras.", "a": "Lo más probable es que la codificación de texto del archivo no sea compatible. Abre el archivo en un editor de texto sin formato (TextEdit en macOS, por ejemplo), usa <em>Formato → Convertir en texto simple</em>, guárdalo como UTF-8 e impórtalo de nuevo."}]}], "needHelp": "¿Aún necesitas ayuda?", "contact": "Escribe a <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>. Incluye el modelo de tu dispositivo, la versión de iOS y una breve descripción del problema (una captura de pantalla ayuda mucho).", "_dir": "ltr", "_date": "May 12, 2026"}, "it": {"title": "Supporto LetterPop", "updatedLabel": "Ultimo aggiornamento:", "intro": "LetterPop è un gioco di parole per iPhone e iPad. Fai scoppiare le palline con le lettere fluttuanti nell'ordine giusto per comporre parole, sblocca amici animali e gioca in 11 lingue. Questa pagina risponde alle domande più frequenti: se non trovi ciò che cerchi, scrivi a <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>.", "download": "Scarica LetterPop sull'App Store", "langLabel": "Lingua", "sections": [{"h": "Per iniziare", "items": [{"q": "Come si gioca?", "a": "In alto sullo schermo compare una parola da comporre. Tocca le palline con le lettere in ordine, da sinistra a destra, per scriverla. Ogni lettera corretta fa guadagnare punti e, completando la parola, parte una celebrazione. La lettera sbagliata vibra e suona: nessuna penalità, basta riprovare."}, {"q": "Come funziona il punteggio?", "a": "Ogni lettera dà 5 punti base moltiplicati per il moltiplicatore attuale. Il moltiplicatore raddoppia ogni volta che raggiungi un traguardo, quindi le serie più lunghe fanno guadagnare molto di più."}, {"q": "Cosa sono i personaggi animali?", "a": "Il piccolo animale nell'angolo in alto a sinistra è il tuo compagno. Inizi con la Lontra e sblocchi altri animali (ciascuno con la propria animazione di sbirciata) raggiungendo i traguardi di punteggio. Gli animali restano sbloccati anche se azzeri il punteggio."}]}, {"h": "Lingue ed elenchi di parole", "items": [{"q": "Quali lingue sono supportate?", "a": "Inglese, spagnolo, italiano, francese, tedesco, russo, ucraino, coreano, cinese, giapponese e arabo: 11 in tutto. Puoi cambiare lingua in qualsiasi momento dalle Impostazioni."}, {"q": "Posso usare il mio elenco di parole?", "a": "Sì. LetterPop accetta file di testo semplice (<code>.txt</code>) o il proprio formato <code>.lpwords</code>: una parola per riga. Per importarli:<ul><li>Salva il file nell'app File, su iCloud Drive o invialo al tuo dispositivo tramite AirDrop.</li><li>Apri il file e scegli \"Apri in LetterPop\", <em>oppure</em></li><li>Copia il file nella cartella di LetterPop tramite Finder (iPhone/iPad → File → LetterPop).</li><li>Apri le Impostazioni nell'app e seleziona il nuovo elenco.</li></ul>I file devono essere in UTF-8, UTF-16 o ASCII. Se le lettere appaiono illeggibili, risalva il file in UTF-8 e importalo di nuovo."}, {"q": "Come si cambia la lunghezza delle parole?", "a": "Apri le Impostazioni e scegli una lunghezza massima delle parole da 3 a 7 lettere. Le parole più corte rendono il gioco più rapido e facile; quelle più lunghe sono più impegnative."}, {"q": "Come si elimina un elenco di parole personalizzato?", "a": "Apri le Impostazioni, trova l'elenco importato e tocca il comando di eliminazione accanto ad esso. Le lingue integrate non possono essere rimosse."}]}, {"h": "Suono e pronuncia", "items": [{"q": "Perché l'app non pronuncia le parole al primo tentativo?", "a": "LetterPop usa le voci integrate nel tuo dispositivo. La prima volta che una parola viene pronunciata, iOS potrebbe aver bisogno di un momento per caricare la voce. Per rendere la pronuncia istantanea, apri le Impostazioni in LetterPop e tocca \"Precarica audio\": questo scarica l'audio per ogni parola dell'elenco attuale. Le impostazioni restano bloccate durante il caricamento; lascia semplicemente che finisca."}, {"q": "La voce della mia lingua suona robotica o è assente.", "a": "La qualità della voce è gestita da iOS. Per installare voci di qualità superiore, vai in <strong>Impostazioni iOS → Accessibilità → Contenuto letto → Voci</strong>, scegli la tua lingua e scarica una voce migliorata o premium. Riavvia LetterPop e verrà usata la nuova voce."}]}, {"h": "Acquisti in-app", "items": [{"q": "Ci sono pubblicità o acquisti obbligatori?", "a": "No. LetterPop non ha pubblicità, abbonamenti né funzioni a pagamento. Tutto nel gioco è disponibile gratuitamente."}, {"q": "A cosa serve \"Sostieni lo sviluppo\"?", "a": "È un salvadanaio per le mance completamente facoltativo. Puoi lasciare una mancia una tantum ($0.99, $1.99 o $4.99) per contribuire a finanziare lo sviluppo. Non sblocca nulla: è solo un ringraziamento."}, {"q": "Come si ripristina un acquisto precedente?", "a": "Apri la schermata \"Sostieni lo sviluppo\" e tocca <strong>Ripristina acquisti</strong>. Assicurati di aver effettuato l'accesso con lo stesso Apple ID usato in origine."}, {"q": "Voglio un rimborso.", "a": "I rimborsi per gli acquisti sull'App Store sono gestiti da Apple, non dallo sviluppatore. Visita <a href=\"https://reportaproblem.apple.com\">reportaproblem.apple.com</a>, accedi con il tuo Apple ID, trova la transazione di LetterPop e invia una richiesta di rimborso."}]}, {"h": "Dati, ripristino e privacy", "items": [{"q": "LetterPop raccoglie dati?", "a": "No. LetterPop non raccoglie, archivia né condivide alcun dato personale. Punteggi, animali sbloccati e le tue preferenze sugli elenchi di parole vengono salvati solo sul tuo dispositivo. Consulta la nostra <a href=\"../PrivacyPolicy/\">Informativa sulla privacy</a> per i dettagli."}, {"q": "Come si azzera il punteggio?", "a": "Apri le Impostazioni e tocca <strong>Ricomincia partita</strong>. Questo cancella il punteggio ma mantiene gli animali che hai sbloccato."}, {"q": "Come si cancella tutto?", "a": "Apri le Impostazioni e tocca <strong>Elimina dati app</strong>. Questo rimuove tutti i punteggi, gli animali sbloccati e gli elenchi di parole importati: l'app torna allo stato del primo avvio. Anche eliminando l'app dalla schermata Home si rimuovono tutti i dati locali."}]}, {"h": "Dispositivi e requisiti", "items": [{"q": "Su quali dispositivi funziona LetterPop?", "a": "iPhone e iPad con <strong>iOS / iPadOS 18.6 o successivo</strong>. Su iPhone si usa l'orientamento verticale; iPad supporta sia verticale che orizzontale."}, {"q": "Il gioco si sincronizza tra i dispositivi?", "a": "Al momento no: i progressi sono memorizzati localmente su ciascun dispositivo."}]}, {"h": "Risoluzione dei problemi", "items": [{"q": "L'app si è bloccata o le lettere non rispondono più.", "a": "Scorri verso l'alto per chiudere LetterPop e riaprilo. Se succede ripetutamente, riavvia il dispositivo. Se il problema persiste, scrivici indicando il modello del dispositivo e la versione di iOS."}, {"q": "Un elenco di parole importato non mostra alcuna parola.", "a": "Molto probabilmente la codifica del testo del file non è supportata. Apri il file in un editor di testo semplice (ad esempio TextEdit su macOS), usa <em>Formato → Converti in testo normale</em>, salva in UTF-8 e importalo di nuovo."}]}], "needHelp": "Hai ancora bisogno di aiuto?", "contact": "Scrivi a <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>. Indica il modello del dispositivo, la versione di iOS e una breve descrizione del problema (uno screenshot aiuta molto).", "_dir": "ltr", "_date": "May 12, 2026"}, "fr": {"title": "Assistance LetterPop", "updatedLabel": "Dernière mise à jour :", "intro": "LetterPop est un jeu de construction de mots pour iPhone et iPad. Faites éclater les bulles de lettres flottantes dans le bon ordre pour former des mots, débloquez des amis animaux et jouez en 11 langues. Cette page répond aux questions les plus fréquentes — si vous ne trouvez pas ce que vous cherchez, écrivez à <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>.", "download": "Télécharger LetterPop sur l'App Store", "langLabel": "Langue", "sections": [{"h": "Premiers pas", "items": [{"q": "Comment jouer ?", "a": "Un mot cible apparaît en haut de l'écran. Touchez les bulles de lettres dans l'ordre, de gauche à droite, pour l'épeler. Chaque lettre correcte rapporte des points, et compléter le mot déclenche une célébration. Une mauvaise lettre tremble et émet un son — aucune pénalité, il suffit de réessayer."}, {"q": "Comment fonctionne le score ?", "a": "Chaque lettre vous rapporte 5 points de base multipliés par votre multiplicateur actuel. Le multiplicateur double à chaque fois que vous atteignez un palier, si bien que les longues séries rapportent bien plus."}, {"q": "Qui sont les personnages animaux ?", "a": "Le petit animal en haut à gauche est votre compagnon. Vous commencez avec la Loutre et débloquez d'autres animaux (chacun avec sa propre animation) en atteignant des paliers de score. Les animaux restent débloqués même si vous réinitialisez votre score."}]}, {"h": "Langues et listes de mots", "items": [{"q": "Quelles langues sont prises en charge ?", "a": "L'anglais, l'espagnol, l'italien, le français, l'allemand, le russe, l'ukrainien, le coréen, le chinois, le japonais et l'arabe — 11 au total. Vous pouvez changer de langue à tout moment dans les Réglages."}, {"q": "Puis-je utiliser ma propre liste de mots ?", "a": "Oui. LetterPop accepte les fichiers texte brut (<code>.txt</code>) ou son propre format <code>.lpwords</code> — un mot par ligne. Pour importer :<ul><li>Enregistrez le fichier dans l'app Fichiers, sur iCloud Drive, ou envoyez-le par AirDrop vers votre appareil.</li><li>Ouvrez le fichier et choisissez « Ouvrir dans LetterPop », <em>ou</em></li><li>Copiez le fichier dans le dossier de LetterPop via le Finder (iPhone/iPad → Fichiers → LetterPop).</li><li>Ouvrez les Réglages dans l'app et sélectionnez la nouvelle liste.</li></ul>Les fichiers doivent être en UTF-8, UTF-16 ou ASCII. Si les lettres semblent corrompues, réenregistrez le fichier en UTF-8 et importez-le à nouveau."}, {"q": "Comment modifier la longueur des mots ?", "a": "Ouvrez les Réglages et choisissez une longueur de mot maximale de 3 à 7 lettres. Les mots plus courts rendent le jeu plus rapide et plus facile ; les mots plus longs sont plus exigeants."}, {"q": "Comment supprimer une liste de mots personnalisée ?", "a": "Ouvrez les Réglages, trouvez votre liste importée et touchez la commande de suppression à côté de celle-ci. Les langues intégrées ne peuvent pas être retirées."}]}, {"h": "Son et parole", "items": [{"q": "Pourquoi l'app ne prononce-t-elle pas les mots du premier coup ?", "a": "LetterPop utilise les voix intégrées de votre appareil. La première fois qu'un mot est prononcé, iOS peut avoir besoin d'un instant pour charger la voix. Pour que la parole soit instantanée, ouvrez les Réglages dans LetterPop et touchez « Précharger l'audio » — cela télécharge l'audio de chaque mot de la liste actuelle. Les réglages restent verrouillés pendant la mise en cache ; laissez simplement l'opération se terminer."}, {"q": "La voix de ma langue semble robotique ou est absente.", "a": "La qualité de la voix est gérée par iOS. Pour installer des voix de meilleure qualité, allez dans <strong>Réglages iOS → Accessibilité → Contenu énoncé → Voix</strong>, choisissez votre langue et téléchargez une voix améliorée ou premium. Redémarrez LetterPop et la nouvelle voix sera utilisée."}]}, {"h": "Achats intégrés", "items": [{"q": "Y a-t-il des publicités ou des achats obligatoires ?", "a": "Non. LetterPop n'a aucune publicité, aucun abonnement et aucune fonctionnalité payante. Tout dans le jeu est disponible gratuitement."}, {"q": "À quoi sert « Soutenir le développement » ?", "a": "C'est une cagnotte de pourboires entièrement facultative. Vous pouvez laisser un pourboire unique (0,99 $, 1,99 $ ou 4,99 $) pour aider à financer le développement. Cela ne débloque rien — c'est simplement un merci."}, {"q": "Comment restaurer un achat précédent ?", "a": "Ouvrez l'écran « Soutenir le développement » et touchez <strong>Restaurer les achats</strong>. Assurez-vous d'être connecté avec le même Apple ID que celui utilisé à l'origine."}, {"q": "Je souhaite un remboursement.", "a": "Les remboursements des achats sur l'App Store sont gérés par Apple, et non par le développeur. Rendez-vous sur <a href=\"https://reportaproblem.apple.com\">reportaproblem.apple.com</a>, connectez-vous avec votre Apple ID, trouvez la transaction LetterPop et soumettez une demande de remboursement."}]}, {"h": "Données, réinitialisation et confidentialité", "items": [{"q": "LetterPop collecte-t-il des données ?", "a": "Non. LetterPop ne collecte, ne stocke ni ne partage aucune donnée personnelle. Les scores, les animaux débloqués et vos préférences de listes de mots sont enregistrés uniquement sur votre appareil. Consultez notre <a href=\"../PrivacyPolicy/\">Politique de confidentialité</a> pour en savoir plus."}, {"q": "Comment réinitialiser mon score ?", "a": "Ouvrez les Réglages et touchez <strong>Réinitialiser le jeu</strong>. Cela efface votre score mais conserve les animaux que vous avez débloqués."}, {"q": "Comment tout effacer ?", "a": "Ouvrez les Réglages et touchez <strong>Supprimer les données de l'app</strong>. Cela supprime tous les scores, les animaux débloqués et les listes de mots importées — l'app revient à son état de premier lancement. Supprimer l'app de votre écran d'accueil efface également toutes les données locales."}]}, {"h": "Appareils et configuration requise", "items": [{"q": "Sur quels appareils LetterPop fonctionne-t-il ?", "a": "iPhone et iPad sous <strong>iOS / iPadOS 18.6 ou version ultérieure</strong>. L'iPhone utilise l'orientation portrait ; l'iPad prend en charge le portrait et le paysage."}, {"q": "Le jeu se synchronise-t-il entre les appareils ?", "a": "Pas pour le moment — la progression est stockée localement sur chaque appareil."}]}, {"h": "Dépannage", "items": [{"q": "L'app s'est figée ou les lettres ne répondent plus.", "a": "Balayez vers le haut pour fermer LetterPop, puis rouvrez-le. Si cela se reproduit, redémarrez votre appareil. Si le problème persiste, écrivez-nous en précisant le modèle de votre appareil et votre version d'iOS."}, {"q": "Une liste de mots importée n'affiche aucun mot.", "a": "Il est très probable que l'encodage du texte du fichier ne soit pas pris en charge. Ouvrez le fichier dans un éditeur de texte brut (TextEdit sur macOS, par exemple), utilisez <em>Format → Convertir au format texte</em>, enregistrez en UTF-8 et importez à nouveau."}]}], "needHelp": "Besoin d'aide supplémentaire ?", "contact": "Écrivez à <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>. Veuillez indiquer le modèle de votre appareil, votre version d'iOS et une brève description du problème (une capture d'écran aide beaucoup).", "_dir": "ltr", "_date": "May 12, 2026"}, "de": {"title": "LetterPop Support", "updatedLabel": "Zuletzt aktualisiert:", "intro": "LetterPop ist ein Wortspiel für iPhone und iPad. Lass schwebende Buchstabenbälle in der richtigen Reihenfolge platzen, um Wörter zu bilden, schalte tierische Freunde frei und spiele in 11 Sprachen. Diese Seite beantwortet häufige Fragen – falls du nicht findest, was du suchst, schreib uns eine E-Mail an <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>.", "download": "LetterPop im App Store laden", "langLabel": "Sprache", "sections": [{"h": "Erste Schritte", "items": [{"q": "Wie spiele ich?", "a": "Oben auf dem Bildschirm erscheint ein Zielwort. Tippe die Buchstabenbälle der Reihe nach von links nach rechts an, um es zu buchstabieren. Jeder richtige Buchstabe bringt Punkte, und wenn du das Wort vervollständigst, gibt es eine kleine Feier. Der falsche Buchstabe wackelt und gibt einen Ton von sich – keine Strafe, versuch es einfach noch einmal."}, {"q": "Wie funktioniert die Punktevergabe?", "a": "Jeder Buchstabe bringt dir 5 Grundpunkte, multipliziert mit deinem aktuellen Multiplikator. Der Multiplikator verdoppelt sich jedes Mal, wenn du einen Meilenstein erreichst, sodass längere Serien deutlich mehr einbringen."}, {"q": "Was haben es mit den Tierfiguren auf sich?", "a": "Das kleine Tier in der oberen linken Ecke ist dein Begleiter. Du startest mit dem Otter und schaltest weitere Tiere (jedes mit seiner eigenen Hervorlugen-Animation) frei, indem du Punkte-Meilensteine erreichst. Tiere bleiben freigeschaltet, auch wenn du deinen Punktestand zurücksetzt."}]}, {"h": "Sprachen & Wortlisten", "items": [{"q": "Welche Sprachen werden unterstützt?", "a": "Englisch, Spanisch, Italienisch, Französisch, Deutsch, Russisch, Ukrainisch, Koreanisch, Chinesisch, Japanisch und Arabisch – insgesamt 11. Du kannst die Sprache jederzeit in den Einstellungen wechseln."}, {"q": "Kann ich meine eigene Wortliste verwenden?", "a": "Ja. LetterPop akzeptiert reine Textdateien (<code>.txt</code>) oder das eigene Format <code>.lpwords</code> – ein Wort pro Zeile. So importierst du sie:<ul><li>Speichere die Datei in der Dateien-App, auf iCloud Drive oder sende sie per AirDrop an dein Gerät.</li><li>Öffne die Datei und wähle „In LetterPop öffnen“ <em>oder</em></li><li>kopiere die Datei über Finder in den Ordner von LetterPop (iPhone/iPad → Dateien → LetterPop).</li><li>Öffne die Einstellungen in der App und wähle die neue Liste aus.</li></ul>Dateien sollten in UTF-8, UTF-16 oder ASCII vorliegen. Wenn Buchstaben verstümmelt aussehen, speichere die Datei erneut als UTF-8 und importiere sie noch einmal."}, {"q": "Wie ändere ich die Wortlänge?", "a": "Öffne die Einstellungen und wähle eine maximale Wortlänge von 3 bis 7 Buchstaben. Kürzere Wörter sorgen für ein schnelleres, leichteres Spiel; längere Wörter sind anspruchsvoller."}, {"q": "Wie lösche ich eine eigene Wortliste?", "a": "Öffne die Einstellungen, suche deine importierte Liste und tippe auf das Löschen-Symbol daneben. Integrierte Sprachen können nicht entfernt werden."}]}, {"h": "Ton & Sprache", "items": [{"q": "Warum spricht die App die Wörter beim ersten Mal nicht aus?", "a": "LetterPop verwendet die integrierten Stimmen deines Geräts. Wenn ein Wort zum ersten Mal gesprochen wird, braucht iOS möglicherweise einen Moment, um die Stimme zu laden. Damit die Sprachausgabe sofort erfolgt, öffne die Einstellungen in LetterPop und tippe auf „Audio vorab laden“ – dadurch wird Audio für jedes Wort der aktuellen Liste heruntergeladen. Während des Ladevorgangs bleiben die Einstellungen gesperrt; lass den Vorgang einfach abschließen."}, {"q": "Die Stimme für meine Sprache klingt roboterhaft oder fehlt.", "a": "Die Sprachqualität wird von iOS gesteuert. Um hochwertigere Stimmen zu installieren, gehe zu <strong>iOS-Einstellungen → Bedienungshilfen → Gesprochene Inhalte → Stimmen</strong>, wähle deine Sprache aus und lade eine erweiterte oder Premium-Stimme herunter. Starte LetterPop neu, dann wird die neue Stimme verwendet."}]}, {"h": "In-App-Käufe", "items": [{"q": "Gibt es Werbung oder Pflichtkäufe?", "a": "Nein. LetterPop hat keine Werbung, keine Abos und keine kostenpflichtig freigeschalteten Funktionen. Alles im Spiel ist kostenlos verfügbar."}, {"q": "Was bewirkt „Entwicklung unterstützen“?", "a": "Das ist ein völlig optionales Trinkgeld. Du kannst ein einmaliges Trinkgeld ($0.99, $1.99 oder $4.99) geben, um die Entwicklung zu unterstützen. Es schaltet nichts frei – es ist einfach ein Dankeschön."}, {"q": "Wie stelle ich einen früheren Kauf wiederher?", "a": "Öffne den Bildschirm „Entwicklung unterstützen“ und tippe auf <strong>Käufe wiederherstellen</strong>. Stelle sicher, dass du mit derselben Apple ID angemeldet bist, die du ursprünglich verwendet hast."}, {"q": "Ich möchte eine Rückerstattung.", "a": "Rückerstattungen für App-Store-Käufe werden von Apple abgewickelt, nicht vom Entwickler. Besuche <a href=\"https://reportaproblem.apple.com\">reportaproblem.apple.com</a>, melde dich mit deiner Apple ID an, suche die LetterPop-Transaktion und reiche einen Antrag auf Rückerstattung ein."}]}, {"h": "Daten, Zurücksetzen und Datenschutz", "items": [{"q": "Erfasst LetterPop Daten?", "a": "Nein. LetterPop erfasst, speichert oder teilt keinerlei personenbezogene Daten. Punktestände, freigeschaltete Tiere und deine Wortlisten-Einstellungen werden nur auf deinem Gerät gespeichert. Weitere Einzelheiten findest du in unserer <a href=\"../PrivacyPolicy/\">Datenschutzrichtlinie</a>."}, {"q": "Wie setze ich meinen Punktestand zurück?", "a": "Öffne die Einstellungen und tippe auf <strong>Spiel zurücksetzen</strong>. Dadurch wird dein Punktestand gelöscht, die freigeschalteten Tiere bleiben jedoch erhalten."}, {"q": "Wie lösche ich alles?", "a": "Öffne die Einstellungen und tippe auf <strong>App-Daten löschen</strong>. Dadurch werden alle Punktestände, freigeschalteten Tiere und importierten Wortlisten entfernt – die App kehrt in den Zustand des ersten Starts zurück. Wenn du die App von deinem Home-Bildschirm löschst, werden ebenfalls alle lokalen Daten entfernt."}]}, {"h": "Geräte & Voraussetzungen", "items": [{"q": "Auf welchen Geräten läuft LetterPop?", "a": "iPhone und iPad mit <strong>iOS / iPadOS 18.6 oder neuer</strong>. Auf dem iPhone wird das Hochformat verwendet; das iPad unterstützt Hoch- und Querformat."}, {"q": "Wird das Spiel zwischen Geräten synchronisiert?", "a": "Derzeit nicht – der Fortschritt wird lokal auf jedem Gerät gespeichert."}]}, {"h": "Fehlerbehebung", "items": [{"q": "Die App ist eingefroren oder die Buchstaben reagieren nicht mehr.", "a": "Wische nach oben, um LetterPop zu schließen, und öffne die App erneut. Wenn das wiederholt passiert, starte dein Gerät neu. Falls das Problem weiterhin besteht, schreib uns bitte eine E-Mail mit deinem Gerätemodell und deiner iOS-Version."}, {"q": "Eine importierte Wortliste zeigt keine Wörter an.", "a": "Höchstwahrscheinlich wird die Textcodierung der Datei nicht unterstützt. Öffne die Datei in einem Editor für reinen Text (zum Beispiel TextEdit auf macOS), verwende <em>Format → In reinen Text umwandeln</em>, speichere sie als UTF-8 und importiere sie erneut."}]}], "needHelp": "Brauchst du noch Hilfe?", "contact": "Schreib eine E-Mail an <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>. Bitte gib dein Gerätemodell, deine iOS-Version und eine kurze Beschreibung des Problems an (ein Screenshot hilft sehr).", "_dir": "ltr", "_date": "May 12, 2026"}, "ru": {"title": "Поддержка LetterPop", "updatedLabel": "Последнее обновление:", "intro": "LetterPop — это игра в составление слов для iPhone и iPad. Лопайте плавающие буквенные шарики в правильном порядке, чтобы составлять слова, открывайте новых друзей-животных и играйте на 11 языках. На этой странице собраны ответы на частые вопросы — если вы не нашли нужного, напишите на <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>.", "download": "Загрузить LetterPop в App Store", "langLabel": "Язык", "sections": [{"h": "Первые шаги", "items": [{"q": "Как играть?", "a": "В верхней части экрана появляется загаданное слово. Нажимайте на буквенные шарики по порядку, слева направо, чтобы составить его. За каждую верную букву начисляются очки, а за составленное слово вас ждёт небольшое празднование. Неверная буква вздрагивает и издаёт сигнал — без штрафа, просто попробуйте снова."}, {"q": "Как начисляются очки?", "a": "Каждая буква даёт 5 базовых очков, умноженных на ваш текущий множитель. Множитель удваивается всякий раз, когда вы достигаете очередного рубежа, поэтому длинные серии приносят гораздо больше очков."}, {"q": "Что за персонажи-животные?", "a": "Маленькое животное в верхнем левом углу — ваш спутник. Вы начинаете с Выдрой и открываете новых животных (у каждого своя анимация выглядывания), достигая рубежей по очкам. Открытые животные остаются доступными, даже если вы сбросите счёт."}]}, {"h": "Языки и списки слов", "items": [{"q": "Какие языки поддерживаются?", "a": "Английский, испанский, итальянский, французский, немецкий, русский, украинский, корейский, китайский, японский и арабский — всего 11. Сменить язык можно в любой момент в Настройках."}, {"q": "Можно ли использовать собственный список слов?", "a": "Да. LetterPop принимает обычные текстовые файлы (<code>.txt</code>) или собственный формат <code>.lpwords</code> — по одному слову на строку. Чтобы импортировать:<ul><li>Сохраните файл в приложение Файлы, в iCloud Drive или передайте его на устройство через AirDrop.</li><li>Откройте файл и выберите «Открыть в LetterPop», <em>либо</em></li><li>Скопируйте файл в папку LetterPop через Finder (iPhone/iPad → Файлы → LetterPop).</li><li>Откройте Настройки в приложении и выберите новый список.</li></ul>Файлы должны быть в кодировке UTF-8, UTF-16 или ASCII. Если буквы отображаются неправильно, пересохраните файл в UTF-8 и импортируйте заново."}, {"q": "Как изменить длину слов?", "a": "Откройте Настройки и выберите максимальную длину слова от 3 до 7 букв. Короткие слова делают игру быстрее и проще, а длинные — сложнее."}, {"q": "Как удалить собственный список слов?", "a": "Откройте Настройки, найдите импортированный список и нажмите кнопку удаления рядом с ним. Встроенные языки удалить нельзя."}]}, {"h": "Звук и речь", "items": [{"q": "Почему приложение не произносит слова с первого раза?", "a": "LetterPop использует встроенные голоса вашего устройства. При первом произнесении слова iOS может потребоваться немного времени, чтобы загрузить голос. Чтобы речь воспроизводилась мгновенно, откройте Настройки в LetterPop и нажмите «Предзагрузить аудио» — это загрузит звук для всех слов текущего списка. Пока идёт кэширование, настройки заблокированы; просто дождитесь завершения."}, {"q": "Голос для моего языка звучит механически или отсутствует.", "a": "Качество голоса контролируется iOS. Чтобы установить голоса более высокого качества, перейдите в <strong>Настройки iOS → Универсальный доступ → Устный контент → Голоса</strong>, выберите свой язык и загрузите улучшенный или премиальный голос. Перезапустите LetterPop, и будет использоваться новый голос."}]}, {"h": "Встроенные покупки", "items": [{"q": "Есть ли реклама или обязательные покупки?", "a": "Нет. В LetterPop нет рекламы, подписок и платных функций. Всё в игре доступно бесплатно."}, {"q": "Что делает кнопка «Поддержать разработку»?", "a": "Это полностью необязательная копилка для чаевых. Вы можете оставить разовые чаевые ($0.99, $1.99 или $4.99), чтобы помочь финансировать разработку. Это ничего не открывает — просто способ сказать спасибо."}, {"q": "Как восстановить предыдущую покупку?", "a": "Откройте экран «Поддержать разработку» и нажмите <strong>Восстановить покупки</strong>. Убедитесь, что вы вошли с тем же Apple ID, который использовали изначально."}, {"q": "Я хочу вернуть деньги.", "a": "Возвраты за покупки в App Store обрабатывает Apple, а не разработчик. Перейдите на <a href=\"https://reportaproblem.apple.com\">reportaproblem.apple.com</a>, войдите с вашим Apple ID, найдите транзакцию LetterPop и отправьте запрос на возврат."}]}, {"h": "Данные, сброс и конфиденциальность", "items": [{"q": "Собирает ли LetterPop какие-либо данные?", "a": "Нет. LetterPop не собирает, не хранит и не передаёт никаких персональных данных. Очки, открытые животные и ваши настройки списков слов сохраняются только на вашем устройстве. Подробнее см. в нашей <a href=\"../PrivacyPolicy/\">Политике конфиденциальности</a>."}, {"q": "Как сбросить счёт?", "a": "Откройте Настройки и нажмите <strong>Сбросить игру</strong>. Это обнулит ваш счёт, но сохранит открытых животных."}, {"q": "Как стереть всё?", "a": "Откройте Настройки и нажмите <strong>Удалить данные приложения</strong>. Это удалит все очки, открытых животных и импортированные списки слов — приложение вернётся к состоянию первого запуска. Удаление приложения с домашнего экрана также стирает все локальные данные."}]}, {"h": "Устройства и требования", "items": [{"q": "На каких устройствах работает LetterPop?", "a": "На iPhone и iPad с <strong>iOS / iPadOS 18.6 или новее</strong>. На iPhone используется вертикальная ориентация; iPad поддерживает вертикальную и горизонтальную."}, {"q": "Синхронизируется ли игра между устройствами?", "a": "Пока нет — прогресс хранится локально на каждом устройстве."}]}, {"h": "Устранение неполадок", "items": [{"q": "Приложение зависло или буквы перестали реагировать.", "a": "Смахните вверх, чтобы закрыть LetterPop, и откройте его снова. Если это повторяется, перезагрузите устройство. Если проблема не исчезает, напишите нам, указав модель устройства и версию iOS."}, {"q": "Импортированный список слов не показывает слов.", "a": "Скорее всего, кодировка текста файла не поддерживается. Откройте файл в простом текстовом редакторе (например, TextEdit на macOS), выберите <em>Формат → Преобразовать в обычный текст</em>, сохраните в UTF-8 и импортируйте заново."}]}], "needHelp": "Всё ещё нужна помощь?", "contact": "Напишите на <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>. Пожалуйста, укажите модель устройства, версию iOS и краткое описание проблемы (снимок экрана очень поможет).", "_dir": "ltr", "_date": "May 12, 2026"}, "uk": {"title": "Підтримка LetterPop", "updatedLabel": "Останнє оновлення:", "intro": "LetterPop — це гра зі складання слів для iPhone та iPad. Лускайте літерні кульки, що пливуть екраном, у правильному порядку, щоб скласти слова, відкривайте друзів-тварин і грайте 11 мовами. На цій сторінці зібрано відповіді на поширені запитання — якщо ви не знайшли потрібного, напишіть нам на <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>.", "download": "Завантажте LetterPop в App Store", "langLabel": "Мова", "sections": [{"h": "Початок роботи", "items": [{"q": "Як грати?", "a": "Угорі екрана з’являється слово-завдання. Торкайтеся літерних кульок по порядку, зліва направо, щоб скласти його. Кожна правильна літера приносить очки, а складене слово запускає святкування. Неправильна літера тремтить і дзвенить — без жодних штрафів, просто спробуйте ще раз."}, {"q": "Як нараховуються очки?", "a": "Кожна літера дає вам 5 базових очок, помножених на ваш поточний множник. Множник подвоюється щоразу, коли ви досягаєте нового рубежу, тож довші серії приносять значно більше очок."}, {"q": "Що це за персонажі-тварини?", "a": "Маленька тваринка у верхньому лівому куті — ваш супутник. Ви починаєте з Видрою та відкриваєте нових тварин (кожна зі своєю анімацією визирання), досягаючи рубежів за очками. Тварини залишаються відкритими, навіть якщо ви скинете свій рахунок."}]}, {"h": "Мови та списки слів", "items": [{"q": "Які мови підтримуються?", "a": "Англійська, іспанська, італійська, французька, німецька, російська, українська, корейська, китайська, японська та арабська — усього 11. Ви можете перемикати мови будь-коли в Налаштуваннях."}, {"q": "Чи можу я використати власний список слів?", "a": "Так. LetterPop приймає звичайні текстові файли (<code>.txt</code>) або власний формат <code>.lpwords</code> — по одному слову на рядок. Щоб імпортувати:<ul><li>Збережіть файл у застосунку Файли, в iCloud Drive або надішліть його на пристрій через AirDrop.</li><li>Відкрийте файл і виберіть «Відкрити в LetterPop», <em>або</em></li><li>Скопіюйте файл у теку LetterPop через Finder (iPhone/iPad → Файли → LetterPop).</li><li>Відкрийте Налаштування в застосунку та виберіть новий список.</li></ul>Файли мають бути в кодуванні UTF-8, UTF-16 або ASCII. Якщо літери відображаються неправильно, повторно збережіть файл у кодуванні UTF-8 та імпортуйте ще раз."}, {"q": "Як змінити довжину слів?", "a": "Відкрийте Налаштування та виберіть максимальну довжину слова від 3 до 7 літер. Коротші слова роблять гру швидшою та простішою; довші слова — складніші."}, {"q": "Як видалити власний список слів?", "a": "Відкрийте Налаштування, знайдіть свій імпортований список і торкніться елемента видалення поруч із ним. Вбудовані мови видалити не можна."}]}, {"h": "Звук і мовлення", "items": [{"q": "Чому застосунок не вимовляє слово з першого разу?", "a": "LetterPop використовує вбудовані голоси вашого пристрою. Коли слово вимовляється вперше, iOS може знадобитися мить, щоб завантажити голос. Щоб зробити мовлення миттєвим, відкрийте Налаштування в LetterPop і торкніться «Попередньо кешувати аудіо» — це завантажить аудіо для кожного слова з поточного списку. Поки триває кешування, налаштування залишаються заблокованими; просто зачекайте, доки воно завершиться."}, {"q": "Голос для моєї мови звучить роботизовано або відсутній.", "a": "Якість голосу контролюється iOS. Щоб установити якісніші голоси, перейдіть у <strong>Налаштування iOS → Доступність → Усне мовлення → Голоси</strong>, виберіть свою мову та завантажте покращений або преміальний голос. Перезапустіть LetterPop, і буде використано новий голос."}]}, {"h": "Покупки в застосунку", "items": [{"q": "Чи є реклама або обов’язкові покупки?", "a": "Ні. У LetterPop немає реклами, підписок та функцій за платним доступом. Усе в грі доступне безкоштовно."}, {"q": "Що робить «Підтримати розробку»?", "a": "Це абсолютно необов’язкова скринька для чайових. Ви можете залишити одноразові чайові ($0.99, $1.99 або $4.99), щоб допомогти фінансувати розробку. Це нічого не відкриває — це просто подяка."}, {"q": "Як відновити попередню покупку?", "a": "Відкрийте екран «Підтримати розробку» і торкніться <strong>Відновити покупки</strong>. Переконайтеся, що ви ввійшли з тим самим Apple ID, який використовували спочатку."}, {"q": "Я хочу повернути кошти.", "a": "Повернення коштів за покупки в App Store здійснює Apple, а не розробник. Перейдіть на <a href=\"https://reportaproblem.apple.com\">reportaproblem.apple.com</a>, увійдіть зі своїм Apple ID, знайдіть транзакцію LetterPop і надішліть запит на повернення коштів."}]}, {"h": "Дані, скидання та конфіденційність", "items": [{"q": "Чи збирає LetterPop якісь дані?", "a": "Ні. LetterPop не збирає, не зберігає та не передає жодних особистих даних. Очки, відкриті тварини та ваші налаштування списків слів зберігаються лише на вашому пристрої. Докладніше читайте в нашій <a href=\"../PrivacyPolicy/\">Політиці конфіденційності</a>."}, {"q": "Як скинути мій рахунок?", "a": "Відкрийте Налаштування та торкніться <strong>Скинути гру</strong>. Це обнулить ваш рахунок, але збереже відкритих вами тварин."}, {"q": "Як стерти все?", "a": "Відкрийте Налаштування та торкніться <strong>Видалити дані застосунку</strong>. Це вилучить усі очки, відкритих тварин та імпортовані списки слів — застосунок повернеться до стану першого запуску. Видалення застосунку з домашнього екрана також стирає всі локальні дані."}]}, {"h": "Пристрої та вимоги", "items": [{"q": "На яких пристроях працює LetterPop?", "a": "На iPhone та iPad з <strong>iOS / iPadOS 18.6 або новішої версії</strong>. iPhone використовує портретну орієнтацію; iPad підтримує як портретну, так і альбомну."}, {"q": "Чи синхронізується гра між пристроями?", "a": "Наразі ні — прогрес зберігається локально на кожному пристрої."}]}, {"h": "Усунення несправностей", "items": [{"q": "Застосунок завис або літери перестали реагувати.", "a": "Проведіть пальцем угору, щоб закрити LetterPop, і відкрийте його знову. Якщо це повторюється, перезапустіть пристрій. Якщо проблема не зникає, напишіть нам, указавши модель свого пристрою та версію iOS."}, {"q": "Імпортований список слів не показує жодних слів.", "a": "Найімовірніше, кодування тексту файлу не підтримується. Відкрийте файл у простому текстовому редакторі (наприклад, TextEdit на macOS), застосуйте <em>Формат → Зробити звичайним текстом</em>, збережіть у кодуванні UTF-8 та імпортуйте ще раз."}]}], "needHelp": "Усе ще потрібна допомога?", "contact": "Напишіть на <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>. Будь ласка, додайте модель свого пристрою, версію iOS та короткий опис проблеми (скріншот дуже допоможе).", "_dir": "ltr", "_date": "May 12, 2026"}, "ko": {"title": "LetterPop 지원", "updatedLabel": "최종 업데이트:", "intro": "LetterPop은 iPhone과 iPad용 단어 만들기 게임입니다. 떠다니는 글자 공을 올바른 순서로 터뜨려 단어를 완성하고, 동물 친구들을 잠금 해제하며, 11개 언어로 즐겨 보세요. 이 페이지에서는 자주 묻는 질문에 대한 답을 드립니다. 원하는 내용을 찾지 못하셨다면 <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>으로 이메일을 보내 주세요.", "download": "App Store에서 LetterPop 다운로드하기", "langLabel": "언어", "sections": [{"h": "시작하기", "items": [{"q": "게임은 어떻게 하나요?", "a": "화면 상단에 목표 단어가 나타납니다. 글자 공을 왼쪽에서 오른쪽으로 순서대로 탭하여 단어를 완성하세요. 글자를 맞힐 때마다 점수를 얻고, 단어를 완성하면 축하 효과가 나타납니다. 틀린 글자는 흔들리며 소리가 나지만 벌점은 없으니 다시 시도하면 됩니다."}, {"q": "점수는 어떻게 매겨지나요?", "a": "각 글자마다 기본 5점에 현재 배율을 곱한 점수를 얻습니다. 마일스톤에 도달할 때마다 배율이 두 배가 되므로, 연속해서 길게 이어 갈수록 훨씬 더 많은 점수를 얻을 수 있습니다."}, {"q": "동물 캐릭터는 무엇인가요?", "a": "왼쪽 상단에 있는 작은 동물은 여러분의 친구입니다. 수달로 시작해서 점수 마일스톤에 도달하면 더 많은 동물(각자 고유한 살짝 보기 애니메이션이 있어요)을 잠금 해제할 수 있습니다. 점수를 초기화해도 동물은 잠금 해제된 상태로 유지됩니다."}]}, {"h": "언어 및 단어 목록", "items": [{"q": "어떤 언어를 지원하나요?", "a": "영어, 스페인어, 이탈리아어, 프랑스어, 독일어, 러시아어, 우크라이나어, 한국어, 중국어, 일본어, 아랍어 등 모두 11개 언어를 지원합니다. 설정에서 언제든지 언어를 변경할 수 있습니다."}, {"q": "제 단어 목록을 사용할 수 있나요?", "a": "네. LetterPop은 일반 텍스트 파일(<code>.txt</code>) 또는 자체 <code>.lpwords</code> 형식을 지원하며, 한 줄에 한 단어씩 입력하면 됩니다. 가져오는 방법은 다음과 같습니다.<ul><li>파일을 파일 앱이나 iCloud Drive에 저장하거나 AirDrop으로 기기에 전송하세요.</li><li>파일을 열고 \"LetterPop에서 열기\"를 선택하거나, <em>또는</em></li><li>Finder를 통해 파일을 LetterPop 폴더에 복사하세요(iPhone/iPad → 파일 → LetterPop).</li><li>앱 내 설정을 열고 새 목록을 선택하세요.</li></ul>파일은 UTF-8, UTF-16 또는 ASCII 형식이어야 합니다. 글자가 깨져 보이면 파일을 UTF-8로 다시 저장한 뒤 다시 가져오세요."}, {"q": "단어 길이는 어떻게 변경하나요?", "a": "설정을 열고 3자에서 7자 사이에서 최대 단어 길이를 선택하세요. 짧은 단어는 더 빠르고 쉬운 게임이 되고, 긴 단어는 더 어려운 도전이 됩니다."}, {"q": "사용자 지정 단어 목록은 어떻게 삭제하나요?", "a": "설정을 열고 가져온 목록을 찾은 다음 그 옆의 삭제 버튼을 탭하세요. 기본 제공 언어는 삭제할 수 없습니다."}]}, {"h": "소리 및 음성", "items": [{"q": "왜 처음에는 앱이 단어를 읽어 주지 않나요?", "a": "LetterPop은 기기에 내장된 음성을 사용합니다. 단어를 처음 읽어 줄 때 iOS가 음성을 불러오는 데 잠시 시간이 걸릴 수 있습니다. 음성을 즉시 재생하려면 LetterPop 내 설정을 열고 \"오디오 미리 캐시\"를 탭하세요. 그러면 현재 목록에 있는 모든 단어의 오디오를 다운로드합니다. 캐싱이 진행되는 동안에는 설정이 잠긴 상태로 유지되니 완료될 때까지 기다려 주세요."}, {"q": "제 언어의 음성이 기계적으로 들리거나 없습니다.", "a": "음성 품질은 iOS에서 제어합니다. 더 높은 품질의 음성을 설치하려면 <strong>iOS 설정 → 손쉬운 사용 → 콘텐츠 말하기 → 음성</strong>으로 이동하여 사용하는 언어를 선택하고 향상된 음성 또는 프리미엄 음성을 다운로드하세요. LetterPop을 다시 시작하면 새 음성이 사용됩니다."}]}, {"h": "앱 내 구입", "items": [{"q": "광고나 필수 구입 항목이 있나요?", "a": "아니요. LetterPop에는 광고도, 구독도, 유료로 잠긴 기능도 없습니다. 게임의 모든 기능을 무료로 이용할 수 있습니다."}, {"q": "\"개발 지원\"은 무엇인가요?", "a": "전적으로 선택 사항인 후원함입니다. 일회성 후원($0.99, $1.99 또는 $4.99)으로 개발을 지원할 수 있습니다. 후원해도 잠금 해제되는 항목은 없으며, 그저 감사의 표시입니다."}, {"q": "이전에 구입한 항목은 어떻게 복원하나요?", "a": "\"개발 지원\" 화면을 열고 <strong>구입 복원</strong>을 탭하세요. 원래 사용했던 것과 동일한 Apple ID로 로그인되어 있는지 확인하세요."}, {"q": "환불을 받고 싶습니다.", "a": "App Store 구입 항목에 대한 환불은 개발자가 아닌 Apple에서 처리합니다. <a href=\"https://reportaproblem.apple.com\">reportaproblem.apple.com</a>에 접속하여 Apple ID로 로그인한 뒤 LetterPop 거래를 찾아 환불 요청을 제출하세요."}]}, {"h": "데이터, 초기화 및 개인정보 보호", "items": [{"q": "LetterPop은 데이터를 수집하나요?", "a": "아니요. LetterPop은 어떠한 개인 데이터도 수집, 저장 또는 공유하지 않습니다. 점수, 잠금 해제한 동물, 단어 목록 환경설정은 기기에만 저장됩니다. 자세한 내용은 <a href=\"../PrivacyPolicy/\">개인정보 처리방침</a>을 참고하세요."}, {"q": "점수는 어떻게 초기화하나요?", "a": "설정을 열고 <strong>게임 초기화</strong>를 탭하세요. 점수는 지워지지만 잠금 해제한 동물은 그대로 유지됩니다."}, {"q": "모든 데이터를 지우려면 어떻게 하나요?", "a": "설정을 열고 <strong>앱 데이터 삭제</strong>를 탭하세요. 모든 점수, 잠금 해제한 동물, 가져온 단어 목록이 삭제되며 앱이 최초 실행 상태로 돌아갑니다. 홈 화면에서 앱을 삭제해도 모든 로컬 데이터가 함께 제거됩니다."}]}, {"h": "기기 및 요구 사항", "items": [{"q": "LetterPop은 어떤 기기에서 실행되나요?", "a": "<strong>iOS / iPadOS 18.6 이상</strong>을 실행하는 iPhone과 iPad에서 사용할 수 있습니다. iPhone은 세로 방향을 사용하고, iPad는 세로와 가로 방향을 모두 지원합니다."}, {"q": "게임 진행 상황이 여러 기기 간에 동기화되나요?", "a": "현재는 동기화되지 않으며, 진행 상황은 각 기기에 로컬로 저장됩니다."}]}, {"h": "문제 해결", "items": [{"q": "앱이 멈추거나 글자가 반응하지 않습니다.", "a": "위로 쓸어올려 LetterPop을 종료한 뒤 다시 여세요. 이런 현상이 반복되면 기기를 재시동하세요. 문제가 계속되면 기기 모델과 iOS 버전을 적어 이메일을 보내 주세요."}, {"q": "가져온 단어 목록에 단어가 표시되지 않습니다.", "a": "대부분 파일의 텍스트 인코딩이 지원되지 않는 경우입니다. 일반 텍스트 편집기(예: macOS의 TextEdit)에서 파일을 열고 <em>포맷 → 일반 텍스트로 만들기</em>를 사용한 뒤 UTF-8로 저장하여 다시 가져오세요."}]}], "needHelp": "여전히 도움이 필요하신가요?", "contact": "<a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>으로 이메일을 보내 주세요. 기기 모델, iOS 버전, 그리고 문제에 대한 간단한 설명을 함께 적어 주세요(스크린샷을 첨부하면 큰 도움이 됩니다).", "_dir": "ltr", "_date": "May 12, 2026"}, "zh": {"title": "LetterPop 支持", "updatedLabel": "最近更新：", "intro": "LetterPop 是一款适用于 iPhone 和 iPad 的拼词游戏。按正确的顺序点破漂浮的字母球来拼出单词，解锁动物伙伴，并支持 11 种语言畅玩。本页解答常见问题——如果没有找到你需要的内容，请发送邮件至 <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>。", "download": "在 App Store 下载 LetterPop", "langLabel": "语言", "sections": [{"h": "新手入门", "items": [{"q": "怎么玩？", "a": "屏幕顶部会出现一个目标单词。从左到右按顺序点击字母球，把它拼出来。每点对一个字母都会得分，拼完整个单词还会触发庆祝动画。点错字母时它会抖动并发出提示音——不会扣分，再试一次就好。"}, {"q": "得分是怎么计算的？", "a": "每个字母的基础分为 5 分，再乘以你当前的倍数。每当你达到一个里程碑，倍数就会翻倍，所以连击越长，得分就越多。"}, {"q": "那些动物角色是什么？", "a": "左上角的小动物是你的伙伴。一开始你会拥有水獭，通过达到分数里程碑可以解锁更多动物（每只都有自己的探头动画）。即使重置分数，已解锁的动物也会一直保留。"}]}, {"h": "语言与单词表", "items": [{"q": "支持哪些语言？", "a": "英语、西班牙语、意大利语、法语、德语、俄语、乌克兰语、韩语、中文、日语和阿拉伯语——共 11 种。你可以随时在“设置”中切换语言。"}, {"q": "我可以使用自己的单词表吗？", "a": "可以。LetterPop 支持纯文本文件（<code>.txt</code>）或它自有的 <code>.lpwords</code> 格式——每行一个单词。导入方法：<ul><li>把文件保存到“文件”App、iCloud Drive，或通过 AirDrop 发送到你的设备。</li><li>打开文件并选择“在 LetterPop 中打开”，<em>或者</em></li><li>通过 Finder 把文件拷贝到 LetterPop 的文件夹中（iPhone/iPad → 文件 → LetterPop）。</li><li>在 App 内打开“设置”，并选择新的单词表。</li></ul>文件应采用 UTF-8、UTF-16 或 ASCII 编码。如果字母显示乱码，请将文件重新保存为 UTF-8 后再次导入。"}, {"q": "怎么更改单词长度？", "a": "打开“设置”，选择 3 到 7 个字母之间的最大单词长度。单词越短，游戏越轻松快速；单词越长，挑战性越高。"}, {"q": "怎么删除自定义单词表？", "a": "打开“设置”，找到你导入的单词表，点击它旁边的删除控件。内置语言无法删除。"}]}, {"h": "声音与语音", "items": [{"q": "为什么第一次播放时 App 不读出单词？", "a": "LetterPop 使用设备内置的语音。某个单词第一次被读出时，iOS 可能需要一点时间来加载语音。如果想让语音即时播放，请在 LetterPop 内打开“设置”，点击“预缓存音频”——这会为当前单词表中的每个单词下载音频。缓存进行时设置会处于锁定状态，让它完成即可。"}, {"q": "我的语言的语音听起来很机械，或者根本没有声音。", "a": "语音质量由 iOS 控制。如需安装更高质量的语音，请前往 <strong>iOS“设置”→ 辅助功能 → 朗读内容 → 嗓音</strong>，选择你的语言，并下载增强版或高级版语音。重新启动 LetterPop 后就会使用新的语音。"}]}, {"h": "App 内购买", "items": [{"q": "有广告或必须付费的内容吗？", "a": "没有。LetterPop 没有广告、没有订阅，也没有付费墙功能。游戏中的一切都可以免费使用。"}, {"q": "“支持开发”有什么作用？", "a": "这是一个完全自愿的打赏功能。你可以一次性打赏（$0.99、$1.99 或 $4.99）来帮助资助开发。它不会解锁任何内容——只是一份心意。"}, {"q": "怎么恢复之前的购买？", "a": "打开“支持开发”界面，点击 <strong>恢复购买项目</strong>。请确保你登录的是当初使用的同一个 Apple ID。"}, {"q": "我想申请退款。", "a": "App Store 购买的退款由 Apple 处理，而非开发者。请访问 <a href=\"https://reportaproblem.apple.com\">reportaproblem.apple.com</a>，使用你的 Apple ID 登录，找到 LetterPop 的交易记录，并提交退款申请。"}]}, {"h": "数据、重置与隐私", "items": [{"q": "LetterPop 会收集任何数据吗？", "a": "不会。LetterPop 不会收集、存储或分享任何个人数据。分数、已解锁的动物以及你的单词表偏好都仅保存在你的设备上。详情请参阅我们的 <a href=\"../PrivacyPolicy/\">隐私政策</a>。"}, {"q": "怎么重置我的分数？", "a": "打开“设置”，点击 <strong>重置游戏</strong>。这会清除你的分数，但会保留你已解锁的动物。"}, {"q": "怎么清除所有内容？", "a": "打开“设置”，点击 <strong>删除 App 数据</strong>。这会移除所有分数、已解锁的动物以及导入的单词表——App 将恢复到首次启动时的状态。从主屏幕删除该 App 同样会移除所有本地数据。"}]}, {"h": "设备与系统要求", "items": [{"q": "LetterPop 可以在哪些设备上运行？", "a": "运行 <strong>iOS / iPadOS 18.6 或更高版本</strong>的 iPhone 和 iPad。iPhone 使用竖屏方向；iPad 同时支持竖屏和横屏。"}, {"q": "游戏会在多台设备间同步吗？", "a": "目前不会——进度存储在每台设备本地。"}]}, {"h": "故障排查", "items": [{"q": "App 卡住了，或者字母没有反应。", "a": "向上滑动关闭 LetterPop，然后重新打开。如果反复出现，请重新启动你的设备。如果问题仍然存在，请通过邮件告诉我们你的设备型号和 iOS 版本。"}, {"q": "导入的单词表没有显示任何单词。", "a": "很可能是文件的文本编码不受支持。请用纯文本编辑器打开该文件（例如 macOS 上的 TextEdit），使用<em>“格式”→“制作纯文本”</em>，保存为 UTF-8，然后再次导入。"}]}], "needHelp": "仍然需要帮助？", "contact": "请发送邮件至 <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>。请附上你的设备型号、iOS 版本，以及对问题的简短描述（提供截图会很有帮助）。", "_dir": "ltr", "_date": "May 12, 2026"}, "ja": {"title": "LetterPop サポート", "updatedLabel": "最終更新日:", "intro": "LetterPop は iPhone と iPad のための単語づくりゲームです。浮かんでいる文字のボールを正しい順番でポップして単語を完成させ、動物の仲間を解放しましょう。11 の言語でお楽しみいただけます。このページではよくあるご質問にお答えしています。お探しの内容が見つからない場合は、<a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a> までメールでお問い合わせください。", "download": "App Store で LetterPop をダウンロード", "langLabel": "言語", "sections": [{"h": "はじめに", "items": [{"q": "遊び方を教えてください。", "a": "画面の上部にお題の単語が表示されます。文字のボールを左から右へ順番にタップして、その単語をつづりましょう。正しい文字をタップするたびに得点が入り、単語を完成させるとお祝いの演出が始まります。間違った文字は揺れて音が鳴りますが、ペナルティはありません。もう一度試してみましょう。"}, {"q": "得点のしくみはどうなっていますか?", "a": "1 文字につき基本 5 点が、現在の倍率を掛けた得点になります。倍率は一定の節目に達するたびに 2 倍になるので、連続して続けるほど大きく得点が伸びます。"}, {"q": "動物のキャラクターとは何ですか?", "a": "画面左上にいる小さな動物は、あなたの相棒です。最初はカワウソからスタートし、得点の節目に達することで、それぞれ独自のひょっこり顔出しアニメーションを持つ動物たちを解放できます。スコアをリセットしても、解放した動物はそのまま残ります。"}]}, {"h": "言語と単語リスト", "items": [{"q": "対応している言語を教えてください。", "a": "英語、スペイン語、イタリア語、フランス語、ドイツ語、ロシア語、ウクライナ語、韓国語、中国語、日本語、アラビア語の全 11 言語に対応しています。言語は設定からいつでも切り替えられます。"}, {"q": "自分の単語リストを使えますか?", "a": "はい。LetterPop はプレーンテキストファイル(<code>.txt</code>)または独自の <code>.lpwords</code> 形式に対応しており、1 行に 1 単語ずつ記述します。読み込むには:<ul><li>ファイルを Files アプリや iCloud Drive に保存するか、AirDrop でお使いのデバイスに送信します。</li><li>ファイルを開いて「LetterPop で開く」を選択する、<em>または</em></li><li>Finder を使って LetterPop のフォルダにファイルをコピーします(iPhone/iPad → Files → LetterPop)。</li><li>アプリ内で設定を開き、新しいリストを選択します。</li></ul>ファイルは UTF-8、UTF-16、または ASCII で保存してください。文字が文字化けして見える場合は、UTF-8 で保存し直してからもう一度読み込んでください。"}, {"q": "単語の長さはどう変更しますか?", "a": "設定を開いて、3 文字から 7 文字までの最大単語長を選びます。短い単語ほどテンポが速く簡単になり、長い単語ほど手応えが増します。"}, {"q": "カスタム単語リストはどう削除しますか?", "a": "設定を開き、読み込んだリストを見つけて、その横にある削除ボタンをタップします。標準搭載の言語は削除できません。"}]}, {"h": "サウンドと読み上げ", "items": [{"q": "最初の 1 回だけ単語が読み上げられないのはなぜですか?", "a": "LetterPop はデバイスに内蔵された音声を使用します。単語が初めて読み上げられるとき、iOS が音声を読み込むのに少し時間がかかることがあります。読み上げをすぐに行えるようにするには、LetterPop 内の設定を開いて「音声を事前にキャッシュ」をタップしてください。現在のリストにあるすべての単語の音声がダウンロードされます。キャッシュの実行中は設定がロックされたままになりますので、完了するまでお待ちください。"}, {"q": "自分の言語の音声が機械的に聞こえる、または見つかりません。", "a": "音声の品質は iOS によって管理されています。より高品質な音声をインストールするには、<strong>「設定」→「アクセシビリティ」→「読み上げコンテンツ」→「声」</strong>に移動し、言語を選んで、高品質またはプレミアムの音声をダウンロードしてください。LetterPop を再起動すると、新しい音声が使用されます。"}]}, {"h": "アプリ内課金", "items": [{"q": "広告や必須の購入はありますか?", "a": "いいえ。LetterPop には広告も、サブスクリプションも、課金が必要な機能もありません。ゲーム内のすべてを無料でご利用いただけます。"}, {"q": "「開発を応援する」とは何ですか?", "a": "これは完全に任意のチップ(投げ銭)です。開発の資金を支援するために、一度きりのチップ($0.99、$1.99、$4.99)を贈ることができます。何かが解放されるわけではなく、感謝の気持ちをお伝えするためのものです。"}, {"q": "過去の購入を復元するには?", "a": "「開発を応援する」画面を開いて、<strong>購入を復元</strong>をタップします。最初に使用したものと同じ Apple ID でサインインしていることを確認してください。"}, {"q": "返金してほしいです。", "a": "App Store での購入の返金は、開発者ではなく Apple が対応します。<a href=\"https://reportaproblem.apple.com\">reportaproblem.apple.com</a> にアクセスし、Apple ID でサインインして、LetterPop の取引を見つけ、返金リクエストを送信してください。"}]}, {"h": "データ、リセット、プライバシー", "items": [{"q": "LetterPop はデータを収集しますか?", "a": "いいえ。LetterPop は個人データの収集、保存、共有を一切行いません。スコア、解放した動物、単語リストの設定は、お使いのデバイスにのみ保存されます。詳しくは<a href=\"../PrivacyPolicy/\">プライバシーポリシー</a>をご覧ください。"}, {"q": "スコアをリセットするには?", "a": "設定を開いて<strong>ゲームをリセット</strong>をタップします。スコアは消去されますが、解放した動物はそのまま残ります。"}, {"q": "すべてを消去するには?", "a": "設定を開いて<strong>アプリデータを削除</strong>をタップします。これにより、すべてのスコア、解放した動物、読み込んだ単語リストが削除され、アプリは初回起動時の状態に戻ります。ホーム画面からアプリを削除した場合も、ローカルデータはすべて削除されます。"}]}, {"h": "デバイスと動作環境", "items": [{"q": "LetterPop はどのデバイスで動作しますか?", "a": "<strong>iOS / iPadOS 18.6 以降</strong>を搭載した iPhone と iPad で動作します。iPhone は縦向きで、iPad は縦向きと横向きの両方に対応しています。"}, {"q": "ゲームはデバイス間で同期しますか?", "a": "現在のところ同期しません。進行状況は各デバイスにローカルで保存されます。"}]}, {"h": "トラブルシューティング", "items": [{"q": "アプリがフリーズした、または文字が反応しなくなりました。", "a": "上にスワイプして LetterPop を終了し、もう一度開いてください。繰り返し発生する場合は、デバイスを再起動してください。それでも問題が解決しない場合は、お使いのデバイスのモデルと iOS のバージョンを添えてメールでお知らせください。"}, {"q": "読み込んだ単語リストに単語が表示されません。", "a": "ファイルのテキストエンコーディングがサポートされていない可能性が高いです。プレーンテキストエディタ(たとえば macOS の TextEdit)でファイルを開き、<em>「フォーマット」→「標準テキストにする」</em>を使って UTF-8 で保存し、もう一度読み込んでください。"}]}], "needHelp": "まだお困りですか?", "contact": "<a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a> までメールでお問い合わせください。お使いのデバイスのモデル、iOS のバージョン、問題の簡単な説明(スクリーンショットがあると大変助かります)を添えてください。", "_dir": "ltr", "_date": "May 12, 2026"}, "ar": {"title": "دعم LetterPop", "updatedLabel": "آخر تحديث:", "intro": "‏LetterPop لعبة لتكوين الكلمات على iPhone وiPad. فرقِّع كرات الحروف العائمة بالترتيب الصحيح لتهجئة الكلمات، وافتح أصدقاءك من الحيوانات، والعب بـ 11 لغة. تجيب هذه الصفحة عن الأسئلة الشائعة — وإذا لم تجد ما تبحث عنه، راسلنا على <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>.", "download": "نزِّل LetterPop من App Store", "langLabel": "اللغة", "sections": [{"h": "البدء", "items": [{"q": "كيف ألعب؟", "a": "تظهر كلمة مستهدفة أعلى الشاشة. انقر كرات الحروف بالترتيب، من اليسار إلى اليمين، لتهجئتها. يمنحك كل حرف صحيح نقاطًا، وإكمال الكلمة يُطلِق احتفالاً. أما الحرف الخاطئ فيهتزّ ويُصدِر صوتًا — من دون أي عقوبة، فقط حاوِل من جديد."}, {"q": "كيف يعمل احتساب النقاط؟", "a": "يمنحك كل حرف 5 نقاط أساسية مضروبة في المُضاعِف الحالي. ويتضاعف المُضاعِف في كل مرة تبلغ فيها مرحلة جديدة، لذا تُكسبك السلاسل الأطول نقاطًا أكثر بكثير."}, {"q": "ما هي شخصيات الحيوانات؟", "a": "الحيوان الصغير في الزاوية العلوية اليسرى هو رفيقك. تبدأ بثعلب الماء، وتفتح المزيد من الحيوانات (لكلٍّ منها حركة إطلالة خاصة به) ببلوغ مراحل من النقاط. تبقى الحيوانات مفتوحة حتى لو أعدت تعيين نقاطك."}]}, {"h": "اللغات وقوائم الكلمات", "items": [{"q": "ما اللغات المدعومة؟", "a": "الإنجليزية والإسبانية والإيطالية والفرنسية والألمانية والروسية والأوكرانية والكورية والصينية واليابانية والعربية — 11 لغة في المجموع. يمكنك تبديل اللغات في أي وقت من الإعدادات."}, {"q": "هل يمكنني استخدام قائمة كلماتي الخاصة؟", "a": "نعم. يقبل LetterPop ملفات نصية عادية (<code>.txt</code>) أو تنسيقه الخاص <code>.lpwords</code> — كلمة واحدة في كل سطر. للاستيراد:<ul><li>احفظ الملف في تطبيق الملفات أو iCloud Drive، أو أرسله إلى جهازك عبر AirDrop.</li><li>افتح الملف واختر \"فتح في LetterPop\"، <em>أو</em></li><li>انسخ الملف إلى مجلد LetterPop عبر Finder (iPhone/iPad → الملفات → LetterPop).</li><li>افتح الإعدادات داخل التطبيق واختر القائمة الجديدة.</li></ul>ينبغي أن تكون الملفات بترميز UTF-8 أو UTF-16 أو ASCII. وإذا ظهرت الحروف مشوّهة، فأعد حفظ الملف بترميز UTF-8 ثم استورده من جديد."}, {"q": "كيف أغيّر طول الكلمة؟", "a": "افتح الإعدادات واختر حدًّا أقصى لطول الكلمة من 3 إلى 7 حروف. الكلمات الأقصر تجعل اللعبة أسرع وأسهل؛ أما الأطول فأكثر تحديًا."}, {"q": "كيف أحذف قائمة كلمات مخصّصة؟", "a": "افتح الإعدادات، وابحث عن قائمتك المستوردة، وانقر زر الحذف بجانبها. أما اللغات المدمجة فلا يمكن إزالتها."}]}, {"h": "الصوت والنطق", "items": [{"q": "لماذا لا ينطق التطبيق الكلمات من المحاولة الأولى؟", "a": "يستخدم LetterPop الأصوات المدمجة في جهازك. وعند نطق كلمة للمرة الأولى، قد يحتاج iOS إلى لحظة لتحميل الصوت. ولجعل النطق فوريًا، افتح الإعدادات داخل LetterPop وانقر \"تخزين الصوت مسبقًا\" — يؤدي ذلك إلى تنزيل الصوت لكل كلمة في القائمة الحالية. تبقى الإعدادات مقفلة أثناء التخزين؛ فاترك العملية حتى تكتمل."}, {"q": "صوت لغتي يبدو آليًا أو غير موجود.", "a": "يتحكّم iOS في جودة الصوت. ولتثبيت أصوات بجودة أعلى، انتقل إلى <strong>إعدادات iOS ← إمكانية الوصول ← المحتوى المنطوق ← الأصوات</strong>، واختر لغتك، ونزِّل صوتًا مُحسَّنًا أو فائق الجودة. أعد تشغيل LetterPop وسيُستخدَم الصوت الجديد."}]}, {"h": "عمليات الشراء داخل التطبيق", "items": [{"q": "هل توجد إعلانات أو عمليات شراء إلزامية؟", "a": "لا. ليس في LetterPop أي إعلانات ولا اشتراكات ولا ميزات محجوبة خلف جدار دفع. كل شيء في اللعبة متاح مجانًا."}, {"q": "ما الذي يفعله \"دعم التطوير\"؟", "a": "إنه صندوق إكراميات اختياري تمامًا. يمكنك ترك إكرامية لمرة واحدة ($0.99 أو $1.99 أو $4.99) للمساهمة في تمويل التطوير. وهو لا يفتح أي شيء — إنه مجرد شكر لك."}, {"q": "كيف أستعيد عملية شراء سابقة؟", "a": "افتح شاشة \"دعم التطوير\" وانقر <strong>استعادة المشتريات</strong>. وتأكّد من أنك مسجّل الدخول بنفس Apple ID الذي استخدمته أصلاً."}, {"q": "أريد استرداد المبلغ.", "a": "تتولّى Apple معالجة عمليات استرداد مشتريات App Store، وليس المطوِّر. تفضّل بزيارة <a href=\"https://reportaproblem.apple.com\">reportaproblem.apple.com</a>، وسجّل الدخول بـ Apple ID الخاص بك، وابحث عن معاملة LetterPop، وأرسِل طلب استرداد."}]}, {"h": "البيانات وإعادة التعيين والخصوصية", "items": [{"q": "هل يجمع LetterPop أي بيانات؟", "a": "لا. لا يجمع LetterPop أي بيانات شخصية ولا يخزّنها ولا يشاركها. تُحفظ النقاط والحيوانات المفتوحة وتفضيلات قائمة الكلمات على جهازك فقط. اطّلع على <a href=\"../PrivacyPolicy/\">سياسة الخصوصية</a> لمعرفة التفاصيل."}, {"q": "كيف أعيد تعيين نقاطي؟", "a": "افتح الإعدادات وانقر <strong>إعادة تعيين اللعبة</strong>. يمسح ذلك نقاطك لكنه يُبقي الحيوانات التي فتحتها."}, {"q": "كيف أمحو كل شيء؟", "a": "افتح الإعدادات وانقر <strong>حذف بيانات التطبيق</strong>. يزيل ذلك جميع النقاط والحيوانات المفتوحة وقوائم الكلمات المستوردة — ويعود التطبيق إلى حالة التشغيل الأول. كما أن حذف التطبيق من شاشتك الرئيسية يزيل جميع البيانات المحلية أيضًا."}]}, {"h": "الأجهزة والمتطلبات", "items": [{"q": "على أي أجهزة يعمل LetterPop؟", "a": "‏iPhone وiPad اللذان يعملان بنظام <strong>iOS / iPadOS 18.6 أو أحدث</strong>. يستخدم iPhone الاتجاه العمودي؛ ويدعم iPad الاتجاهين العمودي والأفقي."}, {"q": "هل تتزامن اللعبة عبر الأجهزة؟", "a": "ليس حاليًا — يُخزَّن التقدّم محليًا على كل جهاز."}]}, {"h": "استكشاف الأخطاء وإصلاحها", "items": [{"q": "تجمّد التطبيق أو توقّفت الحروف عن الاستجابة.", "a": "اسحب لأعلى لإغلاق LetterPop ثم أعد فتحه. وإذا تكرّر ذلك، فأعد تشغيل جهازك. وإذا استمرت المشكلة، فراسلنا مع ذكر طراز جهازك وإصدار iOS."}, {"q": "قائمة كلمات مستوردة لا تُظهر أي كلمات.", "a": "على الأرجح أن ترميز نص الملف غير مدعوم. افتح الملف في محرّر نصوص عادي (TextEdit على macOS مثلاً)، واستخدم <em>تنسيق ← تحويل إلى نص عادي</em>، واحفظه بترميز UTF-8، ثم استورده من جديد."}]}], "needHelp": "ألا تزال بحاجة إلى المساعدة؟", "contact": "راسلنا على <a href=\"mailto:devpavletell@gmail.com?subject=LetterPop%20Support\">devpavletell@gmail.com</a>. يُرجى تضمين طراز جهازك وإصدار iOS ووصف موجز للمشكلة (تساعد لقطة الشاشة كثيرًا).", "_dir": "rtl", "_date": "May 12, 2026"}};
    const LANGS = [{"code": "en", "name": "English", "dir": "ltr"}, {"code": "es", "name": "Español", "dir": "ltr"}, {"code": "it", "name": "Italiano", "dir": "ltr"}, {"code": "fr", "name": "Français", "dir": "ltr"}, {"code": "de", "name": "Deutsch", "dir": "ltr"}, {"code": "ru", "name": "Русский", "dir": "ltr"}, {"code": "uk", "name": "Українська", "dir": "ltr"}, {"code": "ko", "name": "한국어", "dir": "ltr"}, {"code": "zh", "name": "中文", "dir": "ltr"}, {"code": "ja", "name": "日本語", "dir": "ltr"}, {"code": "ar", "name": "العربية", "dir": "rtl"}];
    const STORE_KEY = "letterpop-support-lang";

    function pickDefault() {
      const saved = localStorage.getItem(STORE_KEY);
      if (saved && I18N[saved]) return saved;
      const codes = LANGS.map(l => l.code);
      for (const pref of (navigator.languages || [navigator.language || "en"])) {
        const base = pref.toLowerCase().split("-")[0];
        if (codes.includes(base)) return base;
      }
      return "en";
    }

    function el(id) { return document.getElementById(id); }

    function render(code) {
      const d = I18N[code];
      document.documentElement.lang = code;
      document.documentElement.dir = d._dir;

      el("langLabel").textContent = d.langLabel;
      el("title").textContent = d.title;
      el("updated").textContent = d.updatedLabel + " " + d._date;
      el("intro").innerHTML = d.intro;
      el("download").textContent = d.download;
      el("needHelp").textContent = d.needHelp;
      el("contact").innerHTML = d.contact;

      const faq = el("faq");
      faq.innerHTML = "";
      for (const sec of d.sections) {
        const h = document.createElement("h2");
        h.textContent = sec.h;
        faq.appendChild(h);
        for (const item of sec.items) {
          const det = document.createElement("details");
          const sum = document.createElement("summary");
          sum.textContent = item.q;
          det.appendChild(sum);
          const body = document.createElement("div");
          body.innerHTML = "<p>" + item.a + "</p>";
          while (body.firstChild) det.appendChild(body.firstChild);
          faq.appendChild(det);
        }
      }
      localStorage.setItem(STORE_KEY, code);
    }

    const sel = el("lang");
    for (const l of LANGS) {
      const o = document.createElement("option");
      o.value = l.code;
      o.textContent = l.name;
      sel.appendChild(o);
    }
    const initial = pickDefault();
    sel.value = initial;
    render(initial);
    sel.addEventListener("change", e => render(e.target.value));
  </script>
